<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NYC 2026 Admin Dashboard</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',Arial,sans-serif;background:#f5f3ff;color:#1e1040}
    .header{background:#7c3aed;padding:20px 30px;color:#fff;display:flex;justify-content:space-between;align-items:center}
    .header h1{font-size:20px;font-weight:700}
    .header .stats{display:flex;gap:20px}
    .header .stat{text-align:center}
    .header .stat-n{font-size:24px;font-weight:900}
    .header .stat-l{font-size:11px;opacity:0.8}
    .container{max-width:1200px;margin:0 auto;padding:30px}
    .filters{display:flex;gap:12px;margin-bottom:24px;flex-wrap:wrap}
    .filters select,.filters input{padding:10px 14px;border:1px solid #e9d5ff;border-radius:8px;font-size:14px;background:#fff}
    .filters button{padding:10px 20px;background:#7c3aed;color:#fff;border:none;border-radius:8px;font-weight:600;cursor:pointer}
    .filters button:hover{background:#6d28d9}
    .filters button.secondary{background:#f5f3ff;color:#7c3aed;border:1px solid #c4b5fd}
    .table-wrap{background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 2px 12px rgba(124,58,237,0.08)}
    table{width:100%;border-collapse:collapse}
    th{background:#f5f3ff;padding:14px 16px;text-align:left;font-size:12px;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:0.5px}
    td{padding:14px 16px;border-bottom:1px solid #f3f4f6;font-size:14px}
    tr:hover{background:#faf9ff}
    .badge{display:inline-block;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600}
    .badge.attended{background:#dcfce7;color:#166534}
    .badge.pending{background:#fef3c7;color:#92400e}
    .badge.thanked{background:#dbeafe;color:#1e40af}
    .actions{display:flex;gap:8px}
    .actions button{padding:6px 12px;border:none;border-radius:6px;font-size:12px;cursor:pointer}
    .actions .attend-btn{background:#dcfce7;color:#166534}
    .actions .thank-btn{background:#7c3aed;color:#fff}
    .actions .thank-btn:disabled{background:#ccc;cursor:not-allowed}
    .empty{text-align:center;padding:60px;color:#9ca3af}
    .modal{position:fixed;inset:0;background:rgba(0,0,0,0.5);display:none;align-items:center;justify-content:center;z-index:1000}
    .modal.show{display:flex}
    .modal-content{background:#fff;border-radius:16px;padding:30px;max-width:500px;width:90%;max-height:80vh;overflow-y:auto}
    .modal h2{font-size:18px;margin-bottom:20px}
    .modal .detail-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f3f4f6}
    .modal .detail-label{color:#6b7280}
    .modal .detail-value{font-weight:600}
    .modal .close-btn{background:#f5f3ff;border:none;padding:10px 20px;border-radius:8px;cursor:pointer;margin-top:20px;width:100%}
    .toast{position:fixed;bottom:20px;right:20px;background:#15803d;color:#fff;padding:14px 24px;border-radius:10px;font-weight:600;transform:translateY(100px);transition:transform 0.3s}
    .toast.show{transform:translateY(0)}
  </style>
</head>
<body>
  <div class="header">
    <h1>NYC 2026 Admin Dashboard</h1>
    <div class="stats">
      <div class="stat">
        <div class="stat-n" id="totalReg">0</div>
        <div class="stat-l">Total Registered</div>
      </div>
      <div class="stat">
        <div class="stat-n" id="totalAttended">0</div>
        <div class="stat-l">Attended</div>
      </div>
      <div class="stat">
        <div class="stat-n" id="totalThanked">0</div>
        <div class="stat-l">Thanked</div>
      </div>
    </div>
  </div>

  <div class="container">
    <div class="filters">
      <input type="text" id="searchInput" placeholder="Search by name, email, or ticket ID..." style="flex:1;min-width:200px">
      <select id="ageFilter">
        <option value="">All Age Groups</option>
        <option>16-20</option>
        <option>21-25</option>
        <option>26-30</option>
        <option>31-35</option>
        <option>36-40</option>
      </select>
      <select id="statusFilter">
        <option value="">All Status</option>
        <option value="attended">Attended</option>
        <option value="notAttended">Not Attended</option>
        <option value="thanked">Thanked</option>
      </select>
      <button onclick="loadRegistrations()">Apply Filters</button>
      <button class="secondary" onclick="thankAll()">Thank All Attendees</button>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Ticket ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>Phone</th>
            <th>Age Group</th>
            <th>City</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <tr><td colspan="8" class="empty">Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Detail Modal -->
  <div class="modal" id="detailModal">
    <div class="modal-content">
      <h2>Registration Details</h2>
      <div id="modalBody"></div>
      <button class="close-btn" onclick="closeModal()">Close</button>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script>
    const API_URL = 'http://localhost:3000';
    let allRegistrations = [];

    async function loadRegistrations(){
      const tbody = document.getElementById('tableBody');
      tbody.innerHTML = '<tr><td colspan="8" class="empty">Loading...</td></tr>';
      
      try {
        const response = await fetch(`${API_URL}/api/registrations`);
        const result = await response.json();
        
        if(result.success){
          allRegistrations = result.registrations;
          updateStats(result.stats);
          renderTable(allRegistrations);
        }
      } catch(error){
        tbody.innerHTML = '<tr><td colspan="8" class="empty">Unable to connect to server. Make sure the backend is running.</td></tr>';
      }
    }

    function updateStats(stats){
      document.getElementById('totalReg').textContent = stats.total;
      document.getElementById('totalAttended').textContent = stats.attended;
      document.getElementById('totalThanked').textContent = stats.thanked;
    }

    function renderTable(registrations){
      const tbody = document.getElementById('tableBody');
      
      if(registrations.length === 0){
        tbody.innerHTML = '<tr><td colspan="8" class="empty">No registrations found</td></tr>';
        return;
      }
      
      tbody.innerHTML = registrations.map(reg => `
        <tr>
          <td><strong>${reg.id}</strong></td>
          <td>${reg.name}</td>
          <td>${reg.email}</td>
          <td>${reg.phone}</td>
          <td>${reg.ageGroup}</td>
          <td>${reg.city}</td>
          <td>
            ${reg.attended ? '<span class="badge attended">Attended</span>' : '<span class="badge pending">Registered</span>'}
            ${reg.thanked ? '<span class="badge thanked" style="margin-left:4px">Thanked</span>' : ''}
          </td>
          <td class="actions">
            <button class="attend-btn" onclick="markAttend('${reg.id}')" ${reg.attended ? 'disabled' : ''}>
              ${reg.attended ? '✓ Attended' : 'Mark Attend'}
            </button>
            <button class="thank-btn" onclick="sendThank('${reg.id}')" ${!reg.attended || reg.thanked ? 'disabled' : ''}>
              ${reg.thanked ? '✓ Sent' : 'Send Thank'}
            </button>
          </td>
        </tr>
      `).join('');
    }

    async function markAttend(ticketId){
      try {
        const response = await fetch(`${API_URL}/api/attend`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ ticketId })
        });
        const result = await response.json();
        if(result.success){
          showToast('Attendance marked!');
          loadRegistrations();
        }
      } catch(error){
        showToast('Error marking attendance');
      }
    }

    async function sendThank(ticketId){
      try {
        const response = await fetch(`${API_URL}/api/thank`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ ticketId })
        });
        const result = await response.json();
        if(result.success){
          showToast('Thank you email sent!');
          loadRegistrations();
        }
      } catch(error){
        showToast('Error sending thank you');
      }
    }

    async function thankAll(){
      if(!confirm('Send thank you emails to all attendees who have not been thanked?')) return;
      
      try {
        const response = await fetch(`${API_URL}/api/thank-all`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' }
        });
        const result = await response.json();
        if(result.success){
          showToast(result.message);
          loadRegistrations();
        }
      } catch(error){
        showToast('Error sending bulk thank yous');
      }
    }

    function closeModal(){
      document.getElementById('detailModal').classList.remove('show');
    }

    function showToast(message){
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 3000);
    }

    // Filter functionality
    document.getElementById('searchInput').addEventListener('input', filterTable);
    document.getElementById('ageFilter').addEventListener('change', filterTable);
    document.getElementById('statusFilter').addEventListener('change', filterTable);

    function filterTable(){
      const search = document.getElementById('searchInput').value.toLowerCase();
      const age = document.getElementById('ageFilter').value;
      const status = document.getElementById('statusFilter').value;
      
      let filtered = allRegistrations.filter(reg => {
        const matchSearch = !search || 
          reg.name.toLowerCase().includes(search) || 
          reg.email.toLowerCase().includes(search) ||
          reg.id.toLowerCase().includes(search);
        const matchAge = !age || reg.ageGroup === age;
        const matchStatus = !status || 
          (status === 'attended' && reg.attended) ||
          (status === 'notAttended' && !reg.attended) ||
          (status === 'thanked' && reg.thanked);
        return matchSearch && matchAge && matchStatus;
      });
      
      renderTable(filtered);
    }

    // Load on start
    loadRegistrations();
  </script>
</body>
</html>
